<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deiby · Energía</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;600&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#020c02;
  --g1:#00ff41;
  --g2:#00c932;
  --g3:#006614;
  --text:#ccffcc;
  --muted:#1a4a1a;
}

body{
  background:var(--bg);
  overflow:hidden;
  font-family:'Rajdhani',sans-serif;
}

canvas{
  position:fixed;
  inset:0;
}

/* AVATAR (más pequeño y balanceado) */
.avatar-wrap{
  position:fixed;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:100px;height:100px;
  z-index:5;
}

.avatar{
  width:100px;height:100px;
  border-radius:50%;
  border:2px solid var(--g2);
}

.avatar-ring{
  position:absolute;
  inset:-12px;
  border:1px solid var(--g1);
  border-radius:50%;
  animation:spin 8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* NODOS */
.node{
  position:fixed;
  transform:translate(-50%,-50%);
}

.node-ball{
  width:65px;height:65px;
  border-radius:50%;
  border:1px solid var(--g1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.55rem;
  color:var(--g1);
}

/* PANEL */
.panel{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

input{
  background:none;
  border:1px solid var(--g3);
  color:var(--text);
  padding:6px;
}

button{
  background:none;
  border:1px solid var(--g2);
  color:var(--g1);
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="avatar-wrap">
  <div class="avatar-ring"></div>
  <img class="avatar"
    src="https://avatars.githubusercontent.com/LozanoTH">
</div>

<div class="panel">
  <input id="inp" placeholder="proyecto..."/>
  <button onclick="add()">add</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W,H,cx,cy;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  cx=W/2;cy=H/2;
}
resize();
onresize=resize;

let nodes=[];
let projects=[];

/* JSON STORAGE */
function save(){
  localStorage.setItem("projects",JSON.stringify(projects));
}

function load(){
  const data=localStorage.getItem("projects");
  if(!data)return;
  projects=JSON.parse(data);
  projects.forEach(p=>createNode(p,false));
}

/* POSICIONES MEJORADAS */
function getPos(i,total){
  const angle=(i/total)*Math.PI*2;
  const r=Math.min(W,H)*0.25 + total*10;
  return{
    x:cx+Math.cos(angle)*r,
    y:cy+Math.sin(angle)*r
  }
}

/* CREAR NODO */
function createNode(label,saveFlag=true){

  if(nodes.find(n=>n.label===label)) return;
  if(nodes.length>12) return;

  const el=document.createElement('div');
  el.className='node';

  const ball=document.createElement('div');
  ball.className='node-ball';
  ball.textContent=label;

  el.appendChild(ball);
  document.body.appendChild(el);

  nodes.push({label,el});

  if(saveFlag){
    projects.push(label);
    save();
  }

  reposition();
}

/* REPOSICIONAR */
function reposition(){
  nodes.forEach((n,i)=>{
    const p=getPos(i,nodes.length);
    n.el.style.left=p.x+'px';
    n.el.style.top=p.y+'px';
  });
}

/* AÑADIR */
function add(){
  const v=document.getElementById('inp').value.trim();
  if(!v)return;
  createNode(v,true);
  document.getElementById('inp').value='';
}

/* FONDO SIMPLE */
function loop(){
  ctx.clearRect(0,0,W,H);

  nodes.forEach(n=>{
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(n.el.offsetLeft,n.el.offsetTop);
    ctx.strokeStyle="rgba(0,255,65,.2)";
    ctx.stroke();
  });

  requestAnimationFrame(loop);
}

load();
loop();
</script>

</body>
</html>
